<svg width="680" height="400" viewBox="0 0 680 400" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Logo portfolio Raïs — noir sur fond crème</title>
  <desc>Logo géométrique hexagone avec symbole code, noir sur fond #FEFFF0</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#111" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .hex-stroke { fill: none; stroke: #111; stroke-width: 1.5; }
      .hex-inner  { fill: none; stroke: #111; stroke-width: 0.5; opacity: 0.3; }
      .tick       { stroke: #111; stroke-width: 1.5; stroke-linecap: round; }
      .bracket    { fill: none; stroke: #111; stroke-width: 2.2; stroke-linecap: round; }
      .slash      { stroke: #111; stroke-width: 2.8; stroke-linecap: round; }
      .dot-solid  { fill: #111; }
      .grid       { stroke: #111; stroke-width: 0.4; opacity: 0.1; }
      .name       { font-family: monospace; font-size: 15px; fill: #111; letter-spacing: 0.22em; }
      .sub        { font-family: monospace; font-size: 10px; fill: #555; letter-spacing: 0.3em; }
      .hud        { font-family: monospace; font-size: 9px; fill: #111; opacity: 0.35; }
      .sep        { stroke: #111; stroke-width: 0.8; opacity: 0.35; }
    </style>
  </defs>

  <rect width="680" height="400" fill="#FEFFF0" rx="4"/>

  <line x1="205" y1="65"  x2="475" y2="65"  class="grid"/>
  <line x1="205" y1="335" x2="475" y2="335" class="grid"/>
  <line x1="205" y1="65"  x2="205" y2="335" class="grid"/>
  <line x1="475" y1="65"  x2="475" y2="335" class="grid"/>
  <line x1="340" y1="65"  x2="340" y2="335" class="grid"/>
  <line x1="205" y1="200" x2="475" y2="200" class="grid"/>

  <polygon points="340,90 410,130 410,210 340,250 270,210 270,130" class="hex-stroke"/>
  <polygon points="340,115 388,143 388,197 340,225 292,197 292,143" class="hex-inner"/>

  <circle cx="340" cy="90"  r="2.8" class="dot-solid"/>
  <circle cx="410" cy="130" r="2.8" class="dot-solid"/>
  <circle cx="410" cy="210" r="2.8" class="dot-solid"/>
  <circle cx="340" cy="250" r="2.8" class="dot-solid"/>
  <circle cx="270" cy="210" r="2.8" class="dot-solid"/>
  <circle cx="270" cy="130" r="2.8" class="dot-solid"/>

  <line x1="340" y1="75"  x2="340" y2="90"  class="tick"/>
  <line x1="340" y1="250" x2="340" y2="265" class="tick"/>
  <line x1="422" y1="123" x2="410" y2="130" class="tick"/>
  <line x1="258" y1="123" x2="270" y2="130" class="tick"/>
  <line x1="422" y1="217" x2="410" y2="210" class="tick"/>
  <line x1="258" y1="217" x2="270" y2="210" class="tick"/>

  <polyline points="318,158 306,169 318,180" class="bracket"/>
  <polyline points="362,158 374,169 362,180" class="bracket"/>
  <line x1="349" y1="155" x2="333" y2="183" class="slash"/>

  <line x1="255" y1="283" x2="308" y2="283" class="sep"/>
  <line x1="372" y1="283" x2="425" y2="283" class="sep"/>

  <text x="340" y="280" text-anchor="middle" class="name">RAÏS</text>
  <text x="340" y="303" text-anchor="middle" class="sub">WEB DEVELOPER</text>

  <text x="212" y="78"  class="hud">x:00</text>
  <text x="438" y="78"  class="hud">y:00</text>
  <text x="212" y="328" class="hud">v:1.0</text>
  <text x="432" y="328" class="hud">∅:RS</text>
</svg>
